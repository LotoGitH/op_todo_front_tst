<div class="app-layout">

  <!-- Sidebar izquierdo placeholder (siguiente iteración) -->
  <aside class="app-sidebar-nav">
    <div class="sidebar-logo">✅</div>
    <div class="sidebar-nav-item is-active" title="Mis tareas">📋</div>
    <div class="sidebar-nav-item" title="Próximamente">📅</div>
    <div class="sidebar-nav-item" title="Próximamente">🏷️</div>
    <div class="sidebar-nav-item sidebar-bottom" title="Próximamente">⚙️</div>
  </aside>

  <!-- Sidebar de lista de tareas -->
  <aside class="app-sidebar-list">
    <div class="sidebar-list-header">
      <h1 class="sidebar-list-title">Mis tareas</h1>
    </div>
    <app-todo-list
      (todoSelected)="onTodoSelected($event)"
      (addNewClicked)="onAddNew()"
    ></app-todo-list>
  </aside>

  <!-- Área principal de detalle / formulario -->
  <main class="app-main">
    <app-todo-form
      *ngIf="showForm"
      (created)="onCreated()"
      (cancelled)="showForm = false"
    ></app-todo-form>

    <app-todo-detail
      *ngIf="!showForm"
      [todo]="selectedTodo"
      (saved)="onSaved()"
      (deleted)="onDeleted()"
      (closed)="onDetailClosed()"
    ></app-todo-detail>
  </main>

</div>
